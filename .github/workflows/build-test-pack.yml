name: build-test-pack

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore ISOCodex.Addressing.sln

      - name: Build
        run: dotnet build ISOCodex.Addressing.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test ISOCodex.Addressing.sln --configuration Release --no-build

      - name: Pack core package
        run: dotnet pack src/Addressing/Addressing.csproj --configuration Release --no-build -o ./artifacts
