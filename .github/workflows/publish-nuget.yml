name: publish-nuget

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to publish, for example v1.0.0"
        required: true
        type: string

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Resolve ref
        id: ref
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.release_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.ref.outputs.value }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Release check
        shell: pwsh
        run: ./scripts/release-check.ps1

      - name: NuGet login
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Publish core package
        shell: pwsh
        run: |
          $version = "${{ steps.ref.outputs.value }}".TrimStart("v")
          $package = Get-ChildItem artifacts/release-check/ISOCodex.Addressing.*.nupkg |
            Where-Object { $_.BaseName -eq "ISOCodex.Addressing.$version" } |
            Select-Object -First 1

          if ($null -eq $package) {
            throw "Core package was not found."
          }

          dotnet nuget push $package.FullName --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json

      - name: Publish country packages
        shell: pwsh
        run: |
          $packageIds = @(
            "ISOCodex.Addressing.GreatBritain",
            "ISOCodex.Addressing.UnitedStates",
            "ISOCodex.Addressing.Canada",
            "ISOCodex.Addressing.Spain",
            "ISOCodex.Addressing.Ireland",
            "ISOCodex.Addressing.France"
          )

          foreach ($packageId in $packageIds) {
            $package = Get-ChildItem "artifacts/release-check/$packageId.*.nupkg" |
              Select-Object -First 1

            if ($null -eq $package) {
              throw "$packageId package was not found."
            }

            dotnet nuget push $package.FullName --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json
          }
